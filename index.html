<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>用数据驱动健康增长</title>
<style>
  :root{
    --ink:#1f2b45;
    --ink-soft:#5a6b8c;
    --card-border:rgba(255,255,255,.75);
    --accent:#2f6bff;
    --accent2:#12b981;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    /* 纯明亮质感背景：柔和中性浅色 + 极淡的光晕，不花哨 */
    background:
      radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, rgba(255,255,255,0) 60%),
      linear-gradient(180deg,#f4f7fb 0%, #eef2f8 100%);
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2.5vh 32px;
    gap:2vh;
    overflow:hidden;
  }
  /* 顶部居中标题 */
  header{
    text-align:center;
    flex:0 0 auto;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  .eyebrow{
    display:inline-block;
    font-size:12px;
    letter-spacing:.22em;
    color:var(--ink-soft);
    text-transform:uppercase;
    padding:5px 14px;
    border:1px solid rgba(47,107,255,.2);
    border-radius:999px;
    background:rgba(255,255,255,.6);
    margin-bottom:12px;
  }
  h1{
    font-size:clamp(30px,4.4vw,54px);
    font-weight:800;
    letter-spacing:.02em;
    background:linear-gradient(90deg,#1f2b45,#2f6bff 60%,#12b981);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    line-height:1.15;
  }
  .subtitle{
    margin-top:10px;
    font-size:clamp(13px,1.4vw,17px);
    color:var(--ink-soft);
    font-weight:400;
  }
  .capability{
    margin-top:14px;
    display:inline-block;
    font-size:clamp(15px,1.6vw,19px);
    font-weight:700;
    letter-spacing:.04em;
    color:var(--ink);
    padding:10px 26px;
    border-radius:999px;
    background:rgba(255,255,255,.45);
    backdrop-filter:blur(14px) saturate(150%);
    -webkit-backdrop-filter:blur(14px) saturate(150%);
    border:1px solid rgba(255,255,255,.7);
    box-shadow:0 6px 20px rgba(31,43,69,.08),inset 0 1px 0 rgba(255,255,255,.9);
  }
  /* 模块网格：上排3个，下排2个居中 */
  .grid{
    width:100%;
    max-width:1180px;
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-wrap:wrap;
    align-content:center;
    justify-content:center;
    gap:clamp(14px,1.8vh,22px);
  }
  .card{
    position:relative;
    flex:0 0 clamp(300px,30%,360px);
    min-height:0;
    padding:clamp(20px,2.6vh,30px) 28px;
    border-radius:22px;
    /* 更强玻璃质感：低透明度 + 高斯模糊 + 分层高光 */
    background:
      linear-gradient(135deg,rgba(255,255,255,.55),rgba(255,255,255,.22)),
      radial-gradient(120% 80% at 0% 0%,rgba(255,255,255,.5),transparent 60%);
    backdrop-filter:blur(26px) saturate(165%);
    -webkit-backdrop-filter:blur(26px) saturate(165%);
    border:1px solid var(--card-border);
    box-shadow:
      0 14px 40px rgba(31,43,69,.12),
      inset 0 1px 0 rgba(255,255,255,1),
      inset 0 -1px 0 rgba(255,255,255,.35);
    overflow:hidden;
    cursor:pointer;
    transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s ease,border-color .35s ease;
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
    display:flex;
    flex-direction:column;
  }
  .card:nth-child(1){animation-delay:.05s;}
  .card:nth-child(2){animation-delay:.13s;}
  .card:nth-child(3){animation-delay:.21s;}
  .card:nth-child(4){animation-delay:.29s;}
  .card:nth-child(5){animation-delay:.37s;}
  /* 指针靠近的光斑跟随 */
  .card::before{
    content:"";
    position:absolute;
    left:var(--mx,50%);
    top:var(--my,50%);
    width:320px;height:320px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(47,107,255,.18),rgba(18,185,129,.10) 40%,transparent 70%);
    opacity:0;
    transition:opacity .3s ease;
    pointer-events:none;
  }
  .card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 22px 50px rgba(31,43,69,.16),inset 0 1px 0 rgba(255,255,255,1);
    border-color:rgba(47,107,255,.45);
  }
  .card:hover::before{opacity:1;}
  /* 白色闪光：触碰时一道高光斜扫而过 */
  .card::after{
    content:"";
    position:absolute;
    top:0;left:-140%;
    width:70%;height:100%;
    background:linear-gradient(115deg,
      transparent 0%,
      rgba(255,255,255,.15) 40%,
      rgba(255,255,255,.85) 50%,
      rgba(255,255,255,.15) 60%,
      transparent 100%);
    transform:skewX(-18deg);
    pointer-events:none;
    z-index:2;
  }
  .card:hover::after{
    animation:shine .8s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes shine{
    from{left:-140%;}
    to{left:140%;}
  }
  .icon{
    width:48px;height:48px;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:23px;
    background:linear-gradient(135deg,rgba(47,107,255,.14),rgba(18,185,129,.14));
    border:1px solid rgba(255,255,255,.8);
    margin-bottom:clamp(10px,1.6vh,16px);
  }
  .num{
    position:absolute;top:22px;right:26px;
    font-size:15px;font-weight:700;color:rgba(47,107,255,.35);
    letter-spacing:.05em;
  }
  .card h2{
    font-size:clamp(18px,2vh,21px);font-weight:700;line-height:1.3;margin-bottom:8px;
  }
  .card p{
    font-size:14px;color:var(--ink-soft);line-height:1.7;
  }
  /* 内容层置于闪光之上 */
  .card .icon,.card h2,.card p,.card .num,.card .detail-btn{position:relative;z-index:3;}
  .detail-btn{
    margin-top:clamp(14px,2vh,20px);
    align-self:flex-start;
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 20px;
    font-size:14px;font-weight:600;
    color:var(--accent);
    cursor:pointer;
    border-radius:999px;
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(47,107,255,.3);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
    transition:background .3s ease,color .3s ease,transform .3s ease,box-shadow .3s ease;
  }
  .detail-btn span{transition:transform .3s ease;}
  .detail-btn:hover{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;
    border-color:transparent;
    box-shadow:0 8px 22px rgba(47,107,255,.35);
  }
  .detail-btn:hover span{transform:translateX(4px);}
  @keyframes rise{
    from{opacity:0;transform:translateY(26px);}
    to{opacity:1;transform:translateY(0);}
  }
  @media (max-width:760px){
    /* 手机：解锁一屏高度限制，允许竖向滚动，卡片单列铺满 */
    html,body{height:auto;}
    body{
      height:auto;
      min-height:100vh;
      justify-content:flex-start;
      overflow-x:hidden;
      overflow-y:auto;
      padding:28px 18px 36px;
      gap:22px;
    }
    .grid{
      flex:0 0 auto;
      gap:16px;
    }
    .card{
      flex:0 0 100%;
      width:100%;
      min-height:auto;
      padding:22px 20px;
    }
    h1{font-size:26px;}
    .subtitle{font-size:14px;}
    .capability{font-size:15px;}
  }
</style>
</head>
<body>
  <header>
    <span class="eyebrow">Data · AI · Growth</span>
    <h1>用数据驱动健康增长</h1>
    <p class="subtitle">从人群洞察到转化闭环，构建智能化的一体化增长引擎</p>
    <p class="capability">我具备多维度能力</p>
  </header>

  <main class="grid" id="grid">
    <!-- MODULES -->
  </main>

<script>
  const modules = [
    {icon:"🎯", title:"精细化人群质量评价体系", desc:"多维标签建模，分层评估人群价值，识别高质量目标客群。", link:"detail-1.html"},
    {icon:"✨", title:"AI 营销素材生成 Workflow", desc:"一键生成图文与创意素材，让营销内容规模化、自动化产出。", link:"detail-2.html"},
    {icon:"📊", title:"业务数据分析看板", desc:"实时汇聚核心指标，多维透视业务全景，让决策有据可依。", link:"detail-3.html"},
    {icon:"🔗", title:"转化链路环节优化", desc:"拆解全链路漏斗，定位流失节点，持续提升转化效率。", link:"detail-4.html"},
    {icon:"🤖", title:"团队信息检索 Agent", desc:"智能问答与知识检索，让团队信息触手可及、协作更高效。", link:"detail-5.html"}
  ];
  const grid = document.getElementById("grid");
  modules.forEach((m,i)=>{
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <span class="num">0${i+1}</span>
      <div class="icon">${m.icon}</div>
      <h2>${m.title}</h2>
      <p>${m.desc}</p>
      <button class="detail-btn" type="button">查看详情 <span>→</span></button>`;
    // 点击按钮或卡片均跳转到对应详情页
    const go = ()=>{ window.location.href = m.link; };
    el.querySelector(".detail-btn").addEventListener("click",(ev)=>{ ev.stopPropagation(); go(); });
    el.addEventListener("click", go);
    grid.appendChild(el);
  });
  // 指针靠近：光斑跟随 + 轻微3D倾斜
  document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("mousemove",e=>{
      const r = card.getBoundingClientRect();
      const x = e.clientX - r.left, y = e.clientY - r.top;
      card.style.setProperty("--mx", x+"px");
      card.style.setProperty("--my", y+"px");
      const rx = ((y/r.height)-.5)*-6;
      const ry = ((x/r.width)-.5)*6;
      card.style.transform = `translateY(-8px) scale(1.02) rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    card.addEventListener("mouseleave",()=>{ card.style.transform=""; });
  });
</script>
</body>
</html>
